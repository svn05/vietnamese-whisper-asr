# Vietnamese ASR with Whisper Configuration

model:
  name: "openai/whisper-small"
  language: "vi"
  task: "transcribe"

data:
  dataset: "mozilla-foundation/common_voice_16_1"
  language: "vi"
  sample_rate: 16000
  max_duration: 30.0    # seconds
  max_train_samples: 10000
  max_eval_samples: 1000

preprocessing:
  target_sr: 16000
  noise_augmentation: true
  noise_snr_range: [10, 30]   # dB
  silence_trimming: true
  trim_top_db: 25

training:
  epochs: 5
  batch_size: 8
  learning_rate: 1e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: true
  gradient_accumulation_steps: 2
  eval_steps: 500
  save_steps: 1000

output:
  model_dir: "./outputs/model"
  results_dir: "./outputs/results"
